<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms & Input Tags</title>
</head>
<body>
    <h1>Form to Apply for Sigma - Web Development Course</h1>
    <form action="post">
        <label for="username">Enter your name</label>
        <input type="text" id="username" name="name" placeholder="Enter your name" autofocus>
        <br><br>

        <label for="username">Enter your email</label>
        <input type="email" name="email" placeholder="Enter your email">
        <br><br>

        <label for="username">Enter your age</label>
        <input type="number" name="age" placeholder="Enter your age">
        <br><br>

        <label for="username">Enter your password</label>
        <input type="password" name="password" placeholder="Enter your password">
        <br><br>

        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="female">
        
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="male">
    </form>
</body>
<footer>
    <p>© 2023 Sigma Web Development Course</p>
</footer>
</html>
