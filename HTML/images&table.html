<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images & Tables & Lists</title>
</head>
<body>
    <img src="image.png" height="230"  alt="Train Image">
    <br>
    <hr>

    <table border="1">
        <caption><b><u>Train Schedule</b></u></caption>
        <thead>
            <tr>
            <th>Train Number</th>
            <th colspan="2">Destination</th>
            <th>Departure Time</th>
        </tr>
        </thead>
        
        <tbody>  
        <tr>
            <td colspan="2" rowspan="2">101</td>
            <td>New York</td>
            <td rowspan="2">10:00 AM</td>
        </tr>
        <tr>
            <td>Paris</td>
            </tr> 
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">All times are in local time zone.</td>
                <td>Foot</td>
            </tr>
        </tfoot>
        </table>

        <hr>
        <!-- Lists -->
        <ul type="circle">
            <li>Train 101</li>
            <li>Train 102</li>
            <li>Train 103</li> 
        </ul>
        <ol type="i">
            <li>Train 201</li>
            <li>Train 202</li>
            <li>Train 203</li>
        </ol>
</body>
</html>
