<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial Using reduce and for loop</title>
</head>
<body>
    <script>
        //Using For Loop
        const factorial = (n) => {
            let result = 1;
            for(let i = 2; i <= n; i++){
                result *= i;
            }
            return result;
        };

        console.log(factorial(6)); // Output: 120

        //Using reduce
        let arr = [1, 2, 3, 4, 5];
        const red = (a, b) => {
            return a * b;
        }
        console.log(arr.reduce(red)); // Output: 120

        //using array 
        let a = 6;
        function factorial1(num) {
            let arr = Array.from(Array(num+1).keys())
            console.log(arr)
            let c = arr.slice(1,).reduce((a, b) => {
                return a * b;
            })

            console.log(c)
        }

        factorial1(a);
    </script>
</body>
</html>
