<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Card Design Myself</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      .card {
        width: 384px;
        height: 460px;
        border: 2px solid black;
        background-color: rgba(198, 170, 170, 0.1);
        margin-top: 105px;
        margin-left: 520px;
      }

      .box1 {
        width: 300px;
        height: 400px;
        border: 2px solid black;
        background-size: cover;
        margin-top: 40px;
        margin-left: 40px;
        background-color: white;
        border-radius: 14px;
      }

      .box1 img {
        width: 90%;
        height: 100%;
        border-radius: 10px;
        margin-left: 15px;
        margin-top: 10px;
      }

      h1 {
        text-align: center;
        margin-top: 20px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      #dabba1 {
        width: 60px;
        height: 25px;
        border: 1px solid black;
        border-radius: 50px;
        background-color: rgba(198, 170, 170, 0.1);
        text-align: center;
        position: absolute;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin-left: 60px;
      }

      #dabba2 {
        width: 60px;
        height: 25px;
        border: 1px solid black;
        border-radius: 50px;
        background-color: rgba(198, 170, 170, 0.1);
        text-align: center;
        position: absolute;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin-left: 170px;
      }

      p {
        text-align: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 0 5px;
      }

        #dabba3 {
            width: 80px;
            height: 30px;
            border: 1px solid black;
            border-radius: 50px;
            background-color: #BBDCE5;
            text-align: center;
            position: absolute;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin-left: 110px;
            margin-top: 10px;
            padding-top: 5px;
            cursor: pointer;
            color: rgb(20, 20, 125);
        }
    </style>
  </head>
  <body>
    <!-- card.png is a file which contains a card Image. Write html and css code to design this card. Use #html -->
    <div class="card">
      <div class="box1">
        <div class="image">
          <img src="boat.png" alt="Boat" />
        </div>
        <div id="dabba1">Boat</div>
        <div id="dabba2">Ocean</div>

        <h1><b>Mohini's Creation</b></h1>
        <p>
          Lorem ipsum dolor, sit amet consectetur adipisicing elit. Inventore,
          ipsa! Harum ipsa aut modi possimus optio iusto, eius architecto itaque
          vel voluptatem deserunt.
        </p>

        <div id="dabba3">Read More</div>
      </div>
    </div>
  </body>
</html>
